services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ShopFlow;User Id=sa;Password=ShopFlow123!;TrustServerCertificate=True
      - JwtSettings__Secret=shopflow-secret-key-que-deve-ter-no-minimo-32-caracteres
      - JwtSettings__ExpiresInMinutes=60
      - JwtSettings__Issuer=ShopFlow.API
      - JwtSettings__Audience=ShopFlow.Client
    depends_on:
      sqlserver:
        condition: service_healthy

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=ShopFlow123!
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "ShopFlow123!", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 10